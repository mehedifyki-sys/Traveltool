<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Travel Agent AI Flight Tool V2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#07101d;color:#f5f7fb}
header{padding:24px;background:#102b46}
.container{padding:24px;max-width:1400px;margin:auto}
.grid{display:grid;grid-template-columns:380px 1fr;gap:20px}
.card{background:#101c2e;border-radius:18px;padding:20px;border:1px solid #26384f}
button{width:100%;padding:14px;border:0;border-radius:12px;margin-top:10px;font-weight:700;color:white;background:#087cff;cursor:pointer}
button.green{background:#00b894}
textarea,input{width:100%;padding:12px;border-radius:10px;background:#07101d;color:white;border:1px solid #31445e;margin-top:8px}
.preview{max-width:100%;border-radius:12px;margin-top:12px}
.option{background:#07101d;border:1px solid #31445e;border-radius:16px;padding:16px;margin-bottom:16px}
.best{border:2px solid #00d084}
.copybox{white-space:pre-wrap;background:#0b1728;padding:14px;border-radius:12px}
.small{color:#b8c7d9;font-size:13px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <h1>Travel Agent AI Flight Itinerary & Script Generator V2</h1>
  <p>Paste or upload a flight screenshot and generate client-ready itinerary scripts.</p>
</header>

<div class="container">
  <div class="grid">
    <div class="card">
      <h2>Screenshot Input</h2>
      <input type="file" id="fileInput" accept="image/*">
      <p class="small">Or copy screenshot and press <b>CTRL + V</b> here.</p>
      <div id="pasteBox" style="border:2px dashed #3c526f;padding:18px;border-radius:12px;text-align:center">
        Paste screenshot here
      </div>
      <img id="preview" class="preview" style="display:none">

      <h3>Trip Context</h3>
      <input id="origin" placeholder="Origin city e.g. New York">
      <input id="destination" placeholder="Destination city e.g. Los Angeles">
      <input id="departureDate" placeholder="Departure date e.g. 15 June">
      <input id="returnDate" placeholder="Return date e.g. 22 June">
      <input id="travellers" placeholder="Travellers e.g. 2">
      <input id="cabin" placeholder="Cabin e.g. Economy">

      <button onclick="analyzeImage()">Analyze Screenshot with AI</button>
      <button class="green" onclick="copyBestScript()">Copy Best Option Script</button>
    </div>

    <div class="card">
      <h2>AI Result</h2>
      <div id="status" class="small">Waiting for screenshot...</div>
      <div id="results"></div>
    </div>
  </div>
</div>

<script>
let imageBase64 = "";
let finalData = null;

const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  await loadImage(file);
});

document.addEventListener("paste", async e => {
  const items = e.clipboardData.items;
  for (const item of items) {
    if (item.type.startsWith("image/")) {
      const file = item.getAsFile();
      await loadImage(file);
      break;
    }
  }
});

async function loadImage(file){
  const reader = new FileReader();
  reader.onload = () => {
    imageBase64 = reader.result;
    preview.src = imageBase64;
    preview.style.display = "block";
    document.getElementById("status").innerText = "Screenshot loaded. Ready to analyze.";
  };
  reader.readAsDataURL(file);
}

async function analyzeImage(){
  if(!imageBase64){
    alert("Please upload or paste a screenshot first.");
    return;
  }

  document.getElementById("status").innerText = "AI is analyzing screenshot...";

  const payload = {
    image: imageBase64,
    context: {
      origin: document.getElementById("origin").value,
      destination: document.getElementById("destination").value,
      departureDate: document.getElementById("departureDate").value,
      returnDate: document.getElementById("returnDate").value,
      travellers: document.getElementById("travellers").value,
      cabin: document.getElementById("cabin").value
    }
  };

  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });

  if(!res.ok){
    document.getElementById("status").innerText = "Error analyzing screenshot.";
    return;
  }

  finalData = await res.json();
  renderResults(finalData);
}

function renderResults(data){
  document.getElementById("status").innerText = "Analysis complete. Please verify before ticketing.";
  const results = document.getElementById("results");
  results.innerHTML = "";

  if(data.best_option_summary){
    results.innerHTML += `
      <div class="option best">
        <h2>Best Option Recommendation</h2>
        <div class="copybox">${data.best_option_summary}</div>
      </div>
    `;
  }

  data.flight_options.forEach((opt, i) => {
    results.innerHTML += `
      <div class="option ${opt.is_best ? "best" : ""}">
        <h2>Option ${opt.option_number} ${opt.is_best ? "✅ Best" : ""}</h2>
        <p><b>Airline:</b> ${opt.airline || "Not detected"}</p>
        <p><b>Price:</b> ${opt.price_per_person || "Not detected"} | <b>Total:</b> ${opt.total_price || "Not detected"}</p>
        <p><b>Cabin/Fare:</b> ${opt.cabin_or_fare || "Not detected"}</p>

        <h3>Itinerary</h3>
        <div class="copybox">${opt.itinerary}</div>

        <h3>Travel Agent Script</h3>
        <div class="copybox" id="script-${i}">${opt.script}</div>
        <button onclick="copyText('script-${i}')">Copy This Script</button>

        <h3>Verification Notes</h3>
        <div class="copybox">${opt.verification_notes}</div>
      </div>
    `;
  });
}

function copyText(id){
  navigator.clipboard.writeText(document.getElementById(id).innerText);
  alert("Copied.");
}

function copyBestScript(){
  if(!finalData) return alert("Analyze first.");
  const best = finalData.flight_options.find(x => x.is_best) || finalData.flight_options[0];
  navigator.clipboard.writeText(best.script);
  alert("Best option script copied.");
}
</script>

</body>
</html>
